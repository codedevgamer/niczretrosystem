<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF006E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D9FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo circular -->
  <circle cx="256" cy="256" r="250" fill="url(#grad1)" opacity="0.1"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#grad1)" stroke-width="3"/>

  <!-- Controle de Jogo Principal -->
  <g transform="translate(256, 256)">
    <!-- Corpo do controle -->
    <rect x="-80" y="-50" width="160" height="100" rx="20" fill="#0a0e27" stroke="url(#grad1)" stroke-width="2"/>
    
    <!-- Botões esquerda (D-Pad) -->
    <g transform="translate(-50, -20)">
      <!-- Cruz central -->
      <rect x="-5" y="-15" width="10" height="30" fill="#FF006E" opacity="0.8"/>
      <rect x="-15" y="-5" width="30" height="10" fill="#FF006E" opacity="0.8"/>
      
      <!-- Indicadores -->
      <circle cx="0" cy="-20" r="3" fill="#00D9FF"/>
      <circle cx="20" cy="0" r="3" fill="#00D9FF"/>
      <circle cx="0" cy="20" r="3" fill="#00D9FF"/>
      <circle cx="-20" cy="0" r="3" fill="#00D9FF"/>
    </g>

    <!-- Botões direita (ABXY) -->
    <g transform="translate(50, -20)">
      <!-- Botões coloridos -->
      <circle cx="0" cy="-15" r="6" fill="#FFB703" opacity="0.9"/>
      <circle cx="15" cy="0" r="6" fill="#FF006E" opacity="0.9"/>
      <circle cx="0" cy="15" r="6" fill="#00D9FF" opacity="0.9"/>
      <circle cx="-15" cy="0" r="6" fill="#39FF14" opacity="0.9"/>
      
      <!-- Labels -->
      <text x="0" y="-15" text-anchor="middle" dy="0.3em" font-size="8" fill="#000" font-weight="bold">Y</text>
      <text x="15" y="0" text-anchor="middle" dy="0.3em" font-size="8" fill="#000" font-weight="bold">B</text>
      <text x="0" y="15" text-anchor="middle" dy="0.3em" font-size="8" fill="#000" font-weight="bold">A</text>
      <text x="-15" y="0" text-anchor="middle" dy="0.3em" font-size="8" fill="#000" font-weight="bold">X</text>
    </g>

    <!-- Ombro esquerdo (L1) -->
    <rect x="-75" y="-55" width="25" height="8" rx="4" fill="#00D9FF" opacity="0.7" filter="url(#glow)"/>
    
    <!-- Ombro direito (R1) -->
    <rect x="50" y="-55" width="25" height="8" rx="4" fill="#FF006E" opacity="0.7" filter="url(#glow)"/>

    <!-- Centro (START/SELECT) -->
    <g transform="translate(0, 25)">
      <rect x="-30" y="0" width="25" height="6" rx="3" fill="#00D9FF" opacity="0.5"/>
      <rect x="5" y="0" width="25" height="6" rx="3" fill="#FF006E" opacity="0.5"/>
      <text x="-17" y="11" text-anchor="middle" font-size="6" fill="#00D9FF" opacity="0.8">SELECT</text>
      <text x="18" y="11" text-anchor="middle" font-size="6" fill="#FF006E" opacity="0.8">START</text>
    </g>
  </g>

  <!-- Texto "NiczRetro" -->
  <text x="256" y="420" text-anchor="middle" font-size="32" font-weight="bold" fill="url(#grad1)" font-family="Arial, sans-serif" letter-spacing="2">
    NiczRetro
  </text>

  <!-- Subtítulo "System" -->
  <text x="256" y="450" text-anchor="middle" font-size="18" fill="#00D9FF" opacity="0.8" font-family="Arial, sans-serif">
    SYSTEM
  </text>

  <!-- Decoração: linhas de varredura -->
  <g opacity="0.15" stroke="#00D9FF" stroke-width="1">
    <line x1="100" y1="100" x2="412" y2="100"/>
    <line x1="100" y1="150" x2="412" y2="150"/>
    <line x1="100" y1="200" x2="412" y2="200"/>
    <line x1="100" y1="250" x2="412" y2="250"/>
    <line x1="100" y1="300" x2="412" y2="300"/>
    <line x1="100" y1="350" x2="412" y2="350"/>
    <line x1="100" y1="400" x2="412" y2="400"/>
  </g>

  <!-- Efeito de brilho externo -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="url(#grad1)" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
</svg>
