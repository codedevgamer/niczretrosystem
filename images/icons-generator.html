<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icons Generator - NiczRetroSystem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            color: white;
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: #FF006E;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #00D9FF;
        }

        .icons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .icon-card {
            background: #1a1a1a;
            border: 2px solid #00D9FF;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .icon-preview {
            width: 64px;
            height: 64px;
            margin: 0 auto 15px;
            background: #0a0e27;
            border: 2px solid #FF006E;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .icon-title {
            color: #00D9FF;
            font-weight: bold;
            margin-bottom: 10px;
        }

        button {
            background: #FF006E;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background: #00D9FF;
            color: black;
        }

        .code-block {
            background: #1a1a1a;
            border: 2px solid #00D9FF;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        code {
            color: #00FF00;
            font-family: monospace;
            font-size: 12px;
        }

        pre {
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Icon Generator - NiczRetroSystem</h1>

        <div class="icons-grid" id="iconsGrid"></div>

        <div class="code-block">
            <strong style="color: #FF006E;">Exemplo de Uso:</strong>
            <pre><code>&lt;img src="images/icons/controller.svg" alt="Controle" width="64" height="64"&gt;</code></pre>
        </div>
    </div>

    <script>
        const icons = [
            {
                id: 'controller',
                name: 'Controller',
                emoji: '🎮',
                svg: `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
                        <rect x="10" y="20" width="44" height="24" rx="12" fill="none" stroke="#FF006E" stroke-width="2"/>
                        <circle cx="20" cy="28" r="3" fill="#00D9FF"/>
                        <circle cx="44" cy="28" r="3" fill="#00D9FF"/>
                        <circle cx="20" cy="36" r="3" fill="#00D9FF"/>
                        <circle cx="44" cy="36" r="3" fill="#00D9FF"/>
                    </svg>
                `
            },
            {
                id: 'settings',
                name: 'Settings',
                emoji: '⚙️',
                svg: `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
                        <circle cx="32" cy="32" r="8" fill="none" stroke="#FF006E" stroke-width="2"/>
                        <rect x="29" y="4" width="6" height="8" fill="#00D9FF"/>
                        <rect x="29" y="52" width="6" height="8" fill="#00D9FF"/>
                        <rect x="4" y="29" width="8" height="6" fill="#00D9FF"/>
                        <rect x="52" y="29" width="8" height="6" fill="#00D9FF"/>
                        <rect x="10" y="10" width="6" height="6" fill="#00D9FF"/>
                        <rect x="48" y="10" width="6" height="6" fill="#00D9FF"/>
                        <rect x="10" y="48" width="6" height="6" fill="#00D9FF"/>
                        <rect x="48" y="48" width="6" height="6" fill="#00D9FF"/>
                    </svg>
                `
            },
            {
                id: 'games',
                name: 'Games',
                emoji: '🎯',
                svg: `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
                        <rect x="12" y="16" width="40" height="32" rx="4" fill="none" stroke="#00D9FF" stroke-width="2"/>
                        <circle cx="24" cy="28" r="4" fill="#FF006E"/>
                        <circle cx="40" cy="28" r="4" fill="#FFB703"/>
                        <rect x="16" y="44" width="32" height="2" fill="#00D9FF"/>
                    </svg>
                `
            },
            {
                id: 'favorite',
                name: 'Favorite',
                emoji: '❤️',
                svg: `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
                        <path d="M32 52c-8-8-16-12-16-18 0-6 4-10 8-10 2 0 4 1 6 3 2-2 4-3 6-3 4 0 8 4 8 10 0 6-8 10-16 18z" fill="#FF006E" stroke="#FF006E" stroke-width="1"/>
                    </svg>
                `
            },
            {
                id: 'home',
                name: 'Home',
                emoji: '🏠',
                svg: `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
                        <polygon points="32,12 12,32 16,32 16,50 48,50 48,32 52,32" fill="none" stroke="#00D9FF" stroke-width="2"/>
                        <rect x="24" y="34" width="16" height="12" fill="none" stroke="#00D9FF" stroke-width="2"/>
                        <line x1="32" y1="34" x2="32" y2="46" stroke="#00D9FF" stroke-width="2"/>
                        <line x1="24" y1="40" x2="40" y2="40" stroke="#00D9FF" stroke-width="2"/>
                    </svg>
                `
            },
            {
                id: 'star',
                name: 'Star',
                emoji: '⭐',
                svg: `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
                        <polygon points="32,8 39,28 60,28 43,42 50,62 32,48 14,62 21,42 4,28 25,28" fill="#FFB703" stroke="#FF006E" stroke-width="1"/>
                    </svg>
                `
            }
        ];

        function renderIcons() {
            const grid = document.getElementById('iconsGrid');
            
            icons.forEach(icon => {
                const card = document.createElement('div');
                card.className = 'icon-card';
                
                card.innerHTML = `
                    <div class="icon-title">${icon.name}</div>
                    <div class="icon-preview">${icon.svg}</div>
                    <button onclick="downloadIcon('${icon.id}', '${icon.name}')">💾 Baixar SVG</button>
                    <button onclick="downloadPNG('${icon.id}', '${icon.name}')">🖼️ Baixar PNG</button>
                `;
                
                grid.appendChild(card);
            });
        }

        function downloadIcon(id, name) {
            const icon = icons.find(i => i.id === id);
            const svgData = icon.svg.trim();
            
            const blob = new Blob([`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">${svgData}</svg>`], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${id}.svg`;
            link.click();
        }

        function downloadPNG(id, name) {
            alert(`Para converter SVG para PNG:\n\n1. Salve o SVG primeiro\n2. Use: convert ${id}.svg -density 300 ${id}.png\n3. Ou use um conversor online: cloudconvert.com`);
        }

        renderIcons();
    </script>
</body>
</html>
